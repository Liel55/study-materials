<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>מאגר חומרי לימוד</title>
    <style>
        /* עיצוב כללי */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; }
        .header { background-color: #033c27; color: white; padding: 20px 30px; font-size: 26px; font-weight: bold; border-bottom: 5px solid #7bc0db; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        
        /* תיבת בחירת קורס עם חיפוש */
        .custom-select-container { max-width: 900px; margin: 30px auto 0 auto; position: relative; }
        .search-input { width: 100%; padding: 15px; font-size: 18px; border: 1px solid #ddd; border-radius: 8px; background: white; box-sizing: border-box; outline: none; font-family: inherit; }
        .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px; max-height: 300px; overflow-y: auto; z-index: 1000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .dropdown-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; text-align: right; }
        .dropdown-item:hover { background-color: #f4fbfd; }
        .highlight { background-color: #e0e0e0; font-weight: bold; }

        /* תוכן מרכזי ולשוניות */
        .main-content { background: white; padding: 30px; max-width: 900px; margin: 20px auto 40px auto; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .tabs-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-button { background: none; border: none; font-size: 17px; color: #666; cursor: pointer; padding: 8px 15px; font-family: inherit; }
        .tab-button.active { color: #033c27; font-weight: bold; border-bottom: 3px solid #7bc0db; }

        /* עיצוב מערכת הסינון המשולבת (חיפוש כללי + מסנני עמודות) */
        .global-search-wrapper { position: relative; margin-bottom: 15px; }
        .global-search-input { width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; background-color: #fcfcfc; font-family: inherit; box-sizing: border-box; }
        
        .filters-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 2fr; gap: 8px; background: #f1f5f3; padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .column-filter { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; outline: none; font-family: inherit; }

        /* עיצוב הטבלה */
        .files-table { width: 100%; border-collapse: collapse; }
        .files-table th { background-color: #033c27; color: white; padding: 12px; text-align: right; }
        .files-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; }
        .file-name-cell { display: flex; align-items: center; gap: 10px; flex-direction: row; }
        .file-icon { width: 22px; height: 22px; flex-shrink: 0; }
        .files-table a { text-decoration: none; color: #033c27; font-weight: bold; }
        .message { color: #666; font-style: italic; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <div class="header">מאגר חומרי לימוד</div>

    <div class="custom-select-container">
        <input type="text" id="courseSearch" class="search-input" placeholder="חפשי קורס... (למשל: אינפי)" autocomplete="off">
        <div id="dropdownList" class="dropdown-list"></div>
    </div>

    <div class="main-content">
        <div class="tabs-container" id="tabs-container"></div>
        <div id="display-area">
            <div class="message">אנא בחרי קורס מהרשימה למעלה</div>
        </div>
    </div>

    <script>
        // --- הדביקי כאן את המפתחות שלך ---
        const API_KEY = 'AIzaSyCQPNndwbY2hUEl84aTi964KvBJqXIFqm8';
        const SPREADSHEET_ID = '1Y1OWlKDlRiZGIKw5x_B9nzpWIJRJRlCfr4IUDqAZIRU';
        
        let allData = [];
        let uniqueCourses = [];

        // טעינת נתונים ראשונית
        function fetchSheetData() {
            const range = 'Sheet1!A2:I'; 
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            fetch(url).then(res => res.json()).then(data => {
                allData = data.values || [];
                uniqueCourses = [...new Set(allData.map(row => row[0]).filter(Boolean))];
            }).catch(err => console.error("שגיאה בטעינה:", err));
        }

        // ניהול בחירת הקורס
        const searchInput = document.getElementById('courseSearch');
        const dropdownList = document.getElementById('dropdownList');

        searchInput.addEventListener('input', function() {
            const query = this.value;
            dropdownList.innerHTML = '';
            const filtered = uniqueCourses.filter(c => c.includes(query));
            if (filtered.length > 0) {
                dropdownList.style.display = 'block';
                filtered.forEach(course => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerHTML = course.replace(new RegExp(`(${query})`, 'gi'), '<span class="highlight">$1</span>');
                    div.onclick = () => {
                        searchInput.value = course;
                        dropdownList.style.display = 'none';
                        updateTabs(course);
                    };
                    dropdownList.appendChild(div);
                });
            } else { dropdownList.style.display = 'none'; }
        });

        document.addEventListener('click', (e) => { if (!e.target.closest('.custom-select-container')) dropdownList.style.display = 'none'; });
        searchInput.addEventListener('focus', function() { this.dispatchEvent(new Event('input')); });

        // עדכון לשוניות לפי קורס
        function updateTabs(course) {
            const tabsContainer = document.getElementById('tabs-container');
            const categories = [...new Set(allData.filter(r => r[0] === course).map(r => r[1]).filter(Boolean))];
            tabsContainer.innerHTML = '';
            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-button' + (index === 0 ? ' active' : '');
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderTable(course, cat);
                };
                tabsContainer.appendChild(btn);
            });
            if (categories.length > 0) renderTable(course, categories[0]);
        }

        // הצגת הטבלה והמסננים
        function renderTable(course, category) {
            const filtered = allData.filter(row => row[0] === course && row[1] === category);
            const getUnique = (idx) => [...new Set(filtered.map(r => r[idx] || '-'))].sort();

            let html = `
                <div class="global-search-wrapper">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="חיפוש חופשי בכל הטבלה..." onkeyup="combinedFilter()">
                </div>
                <div class="filters-row">
                    <div><input type="text" class="column-filter" placeholder="שם..." onkeyup="combinedFilter()" data-col="name"></div>
                    <div><select class="column-filter" onchange="combinedFilter()" data-col="4"><option value="">סמסטר...</option>${getUnique(4).map(v => `<option value="${v}">${v}</option>`).join('')}</select></div>
                    <div><select class="column-filter" onchange="combinedFilter()" data-col="5"><option value="">שנה...</option>${getUnique(5).map(v => `<option value="${v}">${v}</option>`).join('')}</select></div>
                    <div><select class="column-filter" onchange="combinedFilter()" data-col="6"><option value="">מרצה...</option>${getUnique(6).map(v => `<option value="${v}">${v}</option>`).join('')}</select></div>
                    <div><input type="text" class="column-filter" placeholder="הערות..." onkeyup="combinedFilter()" data-col="7"></div>
                </div>
                <table class="files-table">
                    <thead><tr><th>שם הקובץ</th><th>סמסטר</th><th>שנה</th><th>מרצה</th><th>הערות</th></tr></thead>
                    <tbody>
            `;

            filtered.forEach(row => {
                html += `
                    <tr class="file-row">
                        <td class="file-name-cell"><img src="${getIconUrl(row[8])}" class="file-icon"><a href="${row[3] || '#'}" target="_blank">${row[2] || '-'}</a></td>
                        <td class="col-4">${row[4] || '-'}</td><td class="col-5">${row[5] || '-'}</td><td class="col-6">${row[6] || '-'}</td><td class="col-7">${row[7] || '-'}</td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            document.getElementById('display-area').innerHTML = html;
        }

        // פונקציית סינון משולבת
        window.combinedFilter = function() {
            const globalQ = document.getElementById('globalSearch').value.toLowerCase();
            const colFilters = document.querySelectorAll('.column-filter');
            const rows = document.querySelectorAll('.file-row');

            rows.forEach(row => {
                const rowText = row.textContent.toLowerCase();
                let matchesGlobal = rowText.includes(globalQ);
                let matchesCols = true;

                colFilters.forEach(f => {
                    const val = f.value.toLowerCase();
                    if (val) {
                        const colId = f.getAttribute('data-col');
                        let cellText = (colId === "name") ? row.querySelector('.file-name-cell').textContent.toLowerCase() : row.querySelector(`.col-${colId}`).textContent.toLowerCase();
                        if (!cellText.includes(val)) matchesCols = false;
                    }
                });
                row.style.display = (matchesGlobal && matchesCols) ? '' : 'none';
            });
        };

        // עזר לאייקונים
        function getIconUrl(type) {
            type = (type || '').toLowerCase();
            const base = 'https://drive-thirdparty.googleusercontent.com/16/type/';
            if (type.includes('pdf')) return base + 'application/pdf';
            if (type.includes('doc')) return base + 'application/vnd.google-apps.document';
            if (type.includes('sheet') || type.includes('xls')) return base + 'application/vnd.google-apps.spreadsheet';
            return base + 'application/octet-stream';
        }

        fetchSheetData();
    </script>
</body>
</html>
